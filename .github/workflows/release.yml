name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          name="pm-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            go build -ldflags="-s -w" -o "${name}.exe" .
            zip "${name}.zip" "${name}.exe"
            echo "archive=${name}.zip" >> "$GITHUB_ENV"
          else
            go build -ldflags="-s -w" -o "$name" .
            tar -czf "${name}.tar.gz" "$name"
            echo "archive=${name}.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: pm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.archive }}

  release:
    name: upload assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
